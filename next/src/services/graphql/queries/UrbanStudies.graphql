fragment UrbanStudySlugEntity on UrbanStudy {
  __typename
  documentId
  slug
  title
}

fragment UrbanStudyEntity on UrbanStudy {
  ...UrbanStudySlugEntity
  publishedAt
  updatedAt
  year
  urbanStudyType
  pictogram
  orderedBy
  preparedBy
  body
  approvalText
  briefFiles {
    ...UploadFileEntity
  }
  commentsEvaluationFiles {
    ...UploadFileEntity
  }
  analyticalPartFiles {
    ...UploadFileEntity
  }
  writtenPartFiles {
    ...UploadFileEntity
  }
  graphicPartFiles {
    ...UploadFileEntity
  }
  attachmentFiles {
    ...UploadFileEntity
  }
  regulations {
    ...RegulationEntity
  }
  links {
    ...CommonLink
  }
}

query UrbanStudyBySlug($slug: String!) {
  urbanStudies(filters: { slug: { eq: $slug } }) {
    ...UrbanStudyEntity
  }
}
