fragment UrbanStudyItem on ComponentBlocksUrbanItem {
  id
  title
  media {
    ...UploadFileEntity
  }
}

fragment UrbanStudyItemsSection on ComponentSectionsUrbanInnerSection {
  title
  text
  items(pagination: { limit: -1 }) {
    ...UrbanStudyItem
  }
}

fragment UrbanStudySlugEntity on UrbanStudy {
  __typename
  documentId
  slug
  title
}

fragment UrbanStudyEntity on UrbanStudy {
  ...UrbanStudySlugEntity
  publishedAt
  updatedAt
  year
  urbanStudyType
  procuredBy
  preparedBy
  body
  approvalText
  urbanStudyItemsSections {
    ...UrbanStudyItemsSection
  }
  regulations {
    ...RegulationEntity
  }
  links {
    ...CommonLink
  }
}

query UrbanStudyBySlug($slug: String!) {
  urbanStudies(filters: { slug: { eq: $slug } }) {
    ...UrbanStudyEntity
  }
}
