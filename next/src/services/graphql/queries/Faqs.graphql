fragment FaqCategoryEntity on FaqCategory {
  documentId
  title
  slug
  faqs {
    ...FaqEntity
  }
}
fragment FaqEntity on Faq {
  documentId
  title
  body
}

query FaqCategories($locale: I18NLocaleCode, $sort: [String] = ["title"]) {
  faqCategories(pagination: { limit: -1 }, locale: $locale, sort: $sort) {
    ...FaqCategoryEntity
  }
}
